{% extends "base.html" %}
{% block title %}Connexion - REMEDY{% endblock %}

{% block content_public %}
<div class="sm:mx-auto sm:w-full sm:max-w-md">
    {% load static %}
    <div class="text-center mb-6">
        <img class="mx-auto h-16 sm:h-20 w-auto" src="{% static 'img/remedi-logo-banner.png' %}" alt="REMEDY" loading="eager">
        <p class="mt-3 text-sm sm:text-base text-slate-600 font-medium">Plateforme Anti-Fraude Réclamations Santé</p>
    </div>
</div>

<div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-6 shadow-xl shadow-slate-200/50 sm:rounded-2xl sm:px-10 border border-slate-100">
        <h3 class="text-lg font-semibold text-slate-900 text-center mb-6">Connexion</h3>
        <form class="space-y-5" method="post">
            {% csrf_token %}
            <div>
                <label for="id_username" class="block text-sm font-medium text-slate-700 mb-1">Utilisateur</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="bi bi-person text-lg"></i>
                    </div>
                    <input id="id_username" name="username" type="text" required placeholder="Nom d'utilisateur ou email" class="block w-full rounded-xl border border-slate-300 py-2.5 pl-10 pr-3 text-slate-900 shadow-sm focus:border-brand-500 focus:ring-1 focus:ring-brand-500 sm:text-sm caret-slate-900" autocomplete="username">
                </div>
            </div>

            <div>
                <label for="id_password" class="block text-sm font-medium text-slate-700 mb-1">Mot de passe</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="bi bi-lock text-lg"></i>
                    </div>
                    <input id="id_password" name="password" type="password" required placeholder="Votre mot de passe" class="block w-full rounded-xl border border-slate-300 py-2.5 pl-10 pr-3 text-slate-900 shadow-sm focus:border-brand-500 focus:ring-1 focus:ring-brand-500 sm:text-sm caret-slate-900" autocomplete="current-password">
                </div>
            </div>

            {% if form.errors %}
                <div class="rounded-md bg-red-50 p-3">
                    <div class="flex">
                        <div class="flex-shrink-0">
                            <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" /></svg>
                        </div>
                        <div class="ml-3">
                            <h3 class="text-sm font-medium text-red-800">Identifiants incorrects</h3>
                        </div>
                    </div>
                </div>
            {% endif %}

            <div>
                <button type="submit" class="flex w-full justify-center items-center gap-2 rounded-xl border border-transparent bg-gradient-to-r from-brand-600 to-brand-500 py-3 px-4 text-sm font-semibold text-white shadow-md hover:shadow-lg hover:from-brand-500 hover:to-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 transition-all">
                    <i class="bi bi-box-arrow-in-right"></i> Se connecter
                </button>
            </div>
        </form>
    </div>
    <p class="mt-4 text-center text-xs text-slate-400">REMEDY V1 — Accès sécurisé</p>
</div>
{% endblock %}
